version: "3.9"

services:
  chauhan-computers:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chauhan-computers
    restart: unless-stopped
    # Ports are handled internally by Coolify reverse proxy (Port 80)
    # No host mapping needed to avoid conflicts with backend (Port 3000)
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# Coolify handles its own reverse proxy (Traefik/Caddy),
# so labels and networking are omitted here intentionally.
