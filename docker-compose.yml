version: "3.9"

services:
  chauhan-computers:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chauhan-computers
    restart: unless-stopped
    ports:
      - "3000:80"           # Access locally at http://localhost:3000
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# Coolify handles its own reverse proxy (Traefik/Caddy),
# so labels and networking are omitted here intentionally.
